project:
  name: dermnet-classifier
  seed: 42

data:
  data_dir: data/raw/train          # root of Kaggle folder-per-class structure
  processed_dir: data/processed
  image_size: 224
  num_classes: 23
  val_split: 0.15
  test_split: 0.10
  num_workers: 4

model:
  backbone: efficientnet_b0         # choices: efficientnet_b0, resnet50, convnext_tiny
  pretrained: true
  dropout: 0.4
  label_smoothing: 0.1

training:
  epochs: 40
  batch_size: 32
  learning_rate: 3.0e-4
  weight_decay: 1.0e-4
  use_weighted_sampler: true
  use_class_weights: true
  mixed_precision: true
  patience: 7

scheduler:
  name: cosine_with_warmup
  warmup_epochs: 3
  min_lr: 1.0e-6

paths:
  checkpoint_dir: outputs/checkpoints
  log_dir: outputs/logs
  figure_dir: outputs/figures
